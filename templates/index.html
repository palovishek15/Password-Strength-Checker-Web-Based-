<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Checker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            color: #f1f5f9;
        }

        .glow {
            box-shadow: 0 0 15px rgba(0,255,200,0.6);
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="container">
    <div class="card p-4 shadow-lg text-center">

        <!-- Title -->
        <h2 class="mb-4 fw-bold" style="
            color:#38bdf8;
            text-shadow: 0 0 10px rgba(56,189,248,0.7);
        ">
        🔐 Password Strength Checker
        </h2>

        <!-- Input -->
        <input type="password" id="password" class="form-control mb-2"
               placeholder="Type your password...">

        <!-- Buttons -->
        <div class="d-flex gap-2 justify-content-center">
            <button onclick="togglePassword()" class="btn btn-sm btn-secondary">Show</button>
            <button onclick="clearPassword()" class="btn btn-sm btn-danger">Clear</button>
        </div>

        <!-- Character Count -->
        <p class="mt-2 text-info">
            Characters: <span id="charCount">0</span>
        </p>

        <!-- Strength -->
        <h4 id="strengthText"></h4>

        <!-- Progress -->
        <div class="progress mb-3">
            <div id="progressBar" class="progress-bar" style="width: 0%">0%</div>
        </div>

        <!-- Feedback -->
        <ul id="feedbackList" class="text-start"></ul>

    </div>
</div>

<script>

// Show/Hide Password
function togglePassword() {
    let x = document.getElementById("password");
    x.type = x.type === "password" ? "text" : "password";
}

// Clear Button
function clearPassword() {
    let input = document.getElementById("password");
    input.value = "";

    document.getElementById("charCount").innerText = 0;
    document.getElementById("strengthText").innerText = "";

    let bar = document.getElementById("progressBar");
    bar.style.width = "0%";
    bar.innerText = "0%";

    document.getElementById("feedbackList").innerHTML = "";
}

// Live Checker
document.getElementById("password").addEventListener("input", function() {

    let password = this.value;

    // Character Count
    document.getElementById("charCount").innerText = password.length;

    fetch('/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password })
    })
    .then(res => res.json())
    .then(data => {

        let text = document.getElementById("strengthText");
        text.innerText = "Strength: " + data.strength;

        let color = "red";
        if (data.strength === "Medium") color = "orange";
        if (data.strength === "Strong") color = "lightgreen";
        if (data.strength === "Very Strong") color = "#00ffcc";

        text.style.color = color;

        let bar = document.getElementById("progressBar");
        let percent = data.score * 10;
        bar.style.width = percent + "%";
        bar.innerText = percent + "%";
        bar.style.backgroundColor = color;
        bar.classList.add("glow");

        let list = document.getElementById("feedbackList");
        list.innerHTML = "";

        data.feedback.forEach(item => {
            let li = document.createElement("li");
            li.innerText = item;
            list.appendChild(li);
        });

    });
});

</script>

</body>
</html>
